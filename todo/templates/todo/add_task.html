<!doctype html>
<html>
  <body>
    <h2>Add Task</h2>

    <form method="POST">
      {% csrf_token %}
      <input
        type="text"
        name="title"
        placeholder="Task name"
        required
      /><br /><br />

      <input type="date" name="due_date" /><br /><br />

      <select name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option></select
      ><br /><br />

      <button type="submit">Add</button>
    </form>
  </body>
</html>
