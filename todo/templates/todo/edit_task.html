<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>

<h2>Edit Task</h2>

<form method="POST">
    {% csrf_token %}

    <!-- Title -->
    <input type="text" name="title" value="{{ task.title }}" required>
    <br><br>

    <!-- Due Date -->
    <input type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">
    <br><br>

    <!-- Priority -->
    <select name="priority">

        <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>
            Low
        </option>

        <option value="Medium" {% if task.priority == "Medium" %}selected{% endif %}>
            Medium
        </option>

        <option value="High" {% if task.priority == "High" %}selected{% endif %}>
            High
        </option>

    </select>

    <br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
