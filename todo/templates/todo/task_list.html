<!doctype html>
<html>
  <head>
    <title>To-Do App</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f6f8;
        text-align: center;
      }
      .container {
        width: 400px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }
      .task {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
      button {
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>My Tasks</h2>

      <a href="{% url 'add_task' %}">➕ Add Task</a>

      {% for task in tasks %}
      <div class="task">
        <span class="{% if task.completed %}completed{% endif %}">
          {{ task.title }} ({{ task.priority }})
        </span>

        <div>
          <a href="{% url 'complete_task' task.id %}">✔</a>
          <a href="{% url 'edit_task' task.id %}">✏️</a>
          <a href="{% url 'delete_task' task.id %}">🗑</a>
        </div>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
